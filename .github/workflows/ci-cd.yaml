name: Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run linting
        run: npm run lint 2>/dev/null || echo "No lint configured"

      - name: Build Docker image
        run: docker build -t simple-app:${{ github.sha }} .

      - name: Test container
        run: |
          docker run -d -p 3000:3000 --name test-app simple-app:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000/health
          docker stop test-app

  push-image:
    name: Prepare Deployment
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      issue_number: ${{ steps.create_issue.outputs.result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment approval issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DEPLOYMENT APPROVAL] ${context.sha}`,
              body: `
            🚀 Deployment Approval Required

            Commit: ${context.sha}
            Branch: ${context.ref}

            Approve deployment by commenting:

            /approve

            Reject deployment by commenting:

            /reject
            `,
              labels: ['deployment', 'pending']
            });

            core.info(`Created issue #${issue.data.number}`);
            return issue.data.number;

      - name: Save issue number
        run: echo "${{ steps.create_issue.outputs.result }}" > issue_number.txt

      - name: Upload issue artifact
        uses: actions/upload-artifact@v4
        with:
          name: issue-info
          path: issue_number.txt

  wait-for-approval:
    name: Wait For Approval
    needs: push-image
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Download issue artifact
        uses: actions/download-artifact@v4
        with:
          name: issue-info

      - name: Wait for approval comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const issueNumber = parseInt(
              fs.readFileSync('issue_number.txt', 'utf8').trim()
            );

            let approved = false;
            let rejected = false;

            while (!approved && !rejected) {

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });

              for (const comment of comments.data) {

                const body = comment.body.trim().toLowerCase();

                if (body === '/approve') {
                  approved = true;

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `✅ Deployment approved by @${comment.user.login}`
                  });

                  break;
                }

                if (body === '/reject') {
                  rejected = true;

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `❌ Deployment rejected by @${comment.user.login}`
                  });

                  core.setFailed('Deployment rejected');
                  return;
                }
              }

              if (!approved && !rejected) {
                console.log('Waiting for approval...');
                await new Promise(resolve => setTimeout(resolve, 60000));
              }
            }

  deploy:
    name: Deploy to Registry
    needs:
      - push-image
      - wait-for-approval

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download issue artifact
        uses: actions/download-artifact@v4
        with:
          name: issue-info

      - name: Set lowercase repo owner
        id: repo
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Hub image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-app:${{ github.sha }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/simple-app:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/simple-app:${{ github.sha }}

      - name: Update deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const issueNumber = parseInt(
              fs.readFileSync('issue_number.txt', 'utf8').trim()
            );

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `
            🎉 Deployment completed successfully!

            Docker Hub:
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/simple-app:${{ github.sha }}

            GHCR:
            docker pull ghcr.io/${{ steps.repo.outputs.owner }}/simple-app:${{ github.sha }}
            `
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });