name: Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: simple-app

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint 2>/dev/null || echo "No lint configured"

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Test Container
        run: |
          docker run -d -p 3000:3000 --name test-app $IMAGE_NAME:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000/health
          docker stop test-app

  deploy-dev:
    name: Deploy to DEV
    needs: build-and-test
    runs-on: ubuntu-latest

    environment:
      name: dev
      url: https://dev.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to DEV
        run: |
          echo "Deploying application to DEV environment"
          echo "DEV deployment completed"

  deploy-staging:
    name: Deploy to STAGING
    needs: deploy-dev
    runs-on: ubuntu-latest

    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to STAGING
        run: |
          echo "Deploying application to STAGING environment"
          echo "STAGING deployment completed"

  deploy-production:
    name: Deploy to PRODUCTION
    needs: deploy-staging
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://production.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lowercase repo owner
        id: repo
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Hub Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-app:${{ github.sha }}

      - name: Build and Push GHCR Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/simple-app:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/simple-app:${{ github.sha }}

      - name: Production Deployment Complete
        run: |
          echo "Production deployment completed successfully"