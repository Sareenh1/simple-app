name: Environment Approval Demo

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      approve_production:
        description: "Approve Production Deployment"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:

  build-and-test:
    if: github.event_name == 'push'

    name: Build & Test
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Docker Image
        run: docker build -t simple-app:${{ github.sha }} .

      - name: Run Health Check
        run: |
          docker run -d -p 3000:3000 --name test-app simple-app:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000/health
          docker stop test-app

  deploy-dev:
    if: github.event_name == 'push'

    name: Deploy to DEV
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy DEV
        run: |
          echo "================================="
          echo "Deploying to DEV Environment"
          echo "Image: simple-app:${{ github.sha }}"
          echo "DEV Deployment Successful"
          echo "================================="

      - name: Manual Approval Instructions
        run: |
          echo ""
          echo "================================="
          echo "PRODUCTION APPROVAL REQUIRED"
          echo "================================="
          echo ""
          echo "To approve production deployment:"
          echo ""
          echo "1. Open GitHub Actions"
          echo "2. Select this workflow"
          echo "3. Click 'Run workflow'"
          echo "4. Select:"
          echo "   approve_production = true"
          echo ""
          echo "================================="

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.approve_production == 'true'

    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Production
        run: |
          echo "================================="
          echo "PRODUCTION APPROVED"
          echo "Deploying to Production"
          echo "Production Deployment Successful"
          echo "================================="